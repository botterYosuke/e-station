site_name: e-station dev
site_description: e-station エンジニア向けドキュメント
site_url: https://botteryosuke.github.io/e-station/
repo_url: https://github.com/botterYosuke/e-station
repo_name: botterYosuke/e-station
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# 公開対象を docs/✅*/**.md と docs/index.md に絞る（archive は除外）。
# MkDocs 1.6+ の exclude_docs は gitignore 形式で、! で再包含できる。
exclude_docs: |
  *.json
  plan/**
  wiki/**
  */archive/**

theme:
  name: material
  language: ja
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切替

nav:
  - ホーム: index.md
  - Python データエンジン:
      - 概要: ✅python-data-engine/README.md
      - 仕様: ✅python-data-engine/spec.md
      - 現行アーキテクチャ: ✅python-data-engine/current-architecture.md
      - 実装計画: ✅python-data-engine/implementation-plan.md
      - Open Questions: ✅python-data-engine/open-questions.md
      - ベンチマーク:
          - Baseline: ✅python-data-engine/benchmarks/baseline.md
          - Phase 2: ✅python-data-engine/benchmarks/phase-2.md
          - Phase 6: ✅python-data-engine/benchmarks/phase-6.md
      - スキーマ:
          - CHANGELOG: ✅python-data-engine/schemas/CHANGELOG.md
  - 立花証券 API 統合:
      - 概要: ✅tachibana/README.md
      - 仕様: ✅tachibana/spec.md
      - アーキテクチャ: ✅tachibana/architecture.md
      - データマッピング: ✅tachibana/data-mapping.md
      - 実装計画: ✅tachibana/implementation-plan.md
      - 不変条件テスト: ✅tachibana/invariant-tests.md
      - Open Questions: ✅tachibana/open-questions.md
  - 立花注文機能:
      - 概要: ✅order/README.md
      - 仕様: ✅order/spec.md
      - アーキテクチャ: ✅order/architecture.md
      - 実装計画: ✅order/implementation-plan.md
      - 不変条件テスト: ✅order/invariant-tests.md
      - Open Questions: ✅order/open-questions.md
  - nautilus_trader 統合:
      - 概要: ✅nautilus_trader/README.md
      - 仕様: ✅nautilus_trader/spec.md
      - アーキテクチャ: ✅nautilus_trader/architecture.md
      - データマッピング: ✅nautilus_trader/data-mapping.md
      - 実装計画: ✅nautilus_trader/implementation-plan.md
      - Open Questions: ✅nautilus_trader/open-questions.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - ja
        - en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/botterYosuke/e-station

copyright: Released under the GPL-3.0 License.
